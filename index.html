<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rubrik | Ransomware Readiness Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --rubrik-blue: #00A3E0;
    --rubrik-dark: #0A0F1E;
    --rubrik-navy: #0D1B3E;
    --rubrik-mid: #112244;
    --accent: #00D4FF;
    --accent2: #FF6B35;
    --green: #00E5A0;
    --yellow: #FFD600;
    --red: #FF3B5C;
    --text: #E8F0FF;
    --text-muted: #7B91B8;
    --card-bg: rgba(17,34,68,0.7);
    --border: rgba(0,163,224,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--rubrik-dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,163,224,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0,212,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(13,27,62,0.9) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,163,224,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,163,224,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 0;
    margin-bottom: 48px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-img {
    height: 36px;
    width: auto;
    filter: brightness(0) invert(1);
  }

  .badge {
    background: rgba(0,163,224,0.15);
    border: 1px solid rgba(0,163,224,0.3);
    color: var(--rubrik-blue);
    font-size: 11px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Hero */
  .hero {
    text-align: center;
    margin-bottom: 52px;
    animation: fadeUp 0.7s ease both;
  }

  .hero-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--rubrik-blue);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .hero-eyebrow::before,
  .hero-eyebrow::after {
    content: '';
    width: 32px;
    height: 1px;
    background: var(--rubrik-blue);
    opacity: 0.5;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.1;
    color: white;
    margin-bottom: 18px;
    letter-spacing: -1.5px;
  }

  .hero h1 span {
    background: linear-gradient(90deg, var(--rubrik-blue), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    color: var(--text-muted);
    font-size: 16px;
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.7;
    font-weight: 300;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 36px;
    animation: fadeUp 0.7s 0.1s ease both;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .progress-count {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    color: var(--rubrik-blue);
    font-weight: 700;
  }

  .progress-bar-bg {
    height: 4px;
    background: rgba(255,255,255,0.07);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--rubrik-blue), var(--accent));
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 12px rgba(0,163,224,0.5);
  }

  /* Question card */
  .question-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 20px;
    backdrop-filter: blur(16px);
    animation: fadeUp 0.5s ease both;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .question-num {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--rubrik-blue);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .question-num::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .question-category {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,163,224,0.1);
    border: 1px solid rgba(0,163,224,0.2);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--rubrik-blue);
    font-weight: 500;
    margin-bottom: 14px;
    letter-spacing: 0.3px;
  }

  .question-text {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: white;
    line-height: 1.4;
    margin-bottom: 28px;
    letter-spacing: -0.3px;
  }

  /* Answer options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 20px;
    border: 1.5px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    background: rgba(255,255,255,0.02);
    position: relative;
    overflow: hidden;
  }

  .option::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(0,163,224,0.08), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .option:hover {
    border-color: rgba(0,163,224,0.4);
    background: rgba(0,163,224,0.05);
    transform: translateX(4px);
  }

  .option:hover::before { opacity: 1; }

  .option.selected {
    border-color: var(--rubrik-blue);
    background: rgba(0,163,224,0.1);
  }

  .option.selected::before { opacity: 1; }

  .option-radio {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .option.selected .option-radio {
    border-color: var(--rubrik-blue);
    background: var(--rubrik-blue);
    box-shadow: 0 0 12px rgba(0,163,224,0.5);
  }

  .option.selected .option-radio::after {
    content: '';
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
  }

  .option-content { flex: 1; }

  .option-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 2px;
  }

  .option-desc {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 300;
    line-height: 1.4;
  }

  /* Navigation */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    animation: fadeUp 0.5s 0.1s ease both;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 28px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    border: none;
    text-decoration: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--rubrik-blue), #0080B8);
    color: white;
    box-shadow: 0 4px 20px rgba(0,163,224,0.35);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(0,163,224,0.45);
    background: linear-gradient(135deg, #10B3F0, var(--rubrik-blue));
  }

  .btn-primary:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid rgba(255,255,255,0.1);
  }

  .btn-ghost:hover {
    color: var(--text);
    border-color: rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.04);
  }

  /* Input field for name/company */
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .input-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .input-field {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 13px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: white;
    outline: none;
    transition: all 0.2s;
    width: 100%;
  }

  .input-field::placeholder { color: rgba(255,255,255,0.2); }

  .input-field:focus {
    border-color: var(--rubrik-blue);
    background: rgba(0,163,224,0.05);
    box-shadow: 0 0 0 3px rgba(0,163,224,0.1);
  }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* Results */
  .results {
    animation: fadeUp 0.7s ease both;
  }

  .score-hero {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 44px;
    text-align: center;
    margin-bottom: 24px;
    backdrop-filter: blur(16px);
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }

  .score-ring {
    width: 160px;
    height: 160px;
    margin: 0 auto 24px;
    position: relative;
  }

  .score-ring svg {
    transform: rotate(-90deg);
  }

  .score-ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.07);
    stroke-width: 8;
  }

  .score-ring-fill {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1);
  }

  .score-number {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .score-value {
    font-family: 'Syne', sans-serif;
    font-size: 42px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
  }

  .score-max {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .score-tier {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: -0.5px;
  }

  .score-desc {
    color: var(--text-muted);
    font-size: 14px;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.7;
    font-weight: 300;
  }

  /* Category breakdown */
  .breakdown-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .breakdown-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(12px);
    transition: transform 0.2s;
  }

  .breakdown-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .breakdown-cat {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }

  .breakdown-score {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
  }

  .breakdown-bar-bg {
    height: 6px;
    background: rgba(255,255,255,0.07);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .breakdown-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
  }

  .breakdown-icon { font-size: 20px; margin-bottom: 8px; }

  /* Findings */
  .findings-section {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
    backdrop-filter: blur(12px);
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: white;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: -0.3px;
  }

  .finding-item {
    display: flex;
    gap: 16px;
    padding: 18px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .finding-item:last-child { border-bottom: none; padding-bottom: 0; }

  .finding-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 6px;
  }

  .finding-title {
    font-size: 14px;
    font-weight: 600;
    color: white;
    margin-bottom: 4px;
  }

  .finding-text {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    font-weight: 300;
  }

  /* Rubrik solutions */
  .solutions-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .solution-card {
    display: flex;
    gap: 18px;
    padding: 20px;
    background: rgba(0,163,224,0.05);
    border: 1px solid rgba(0,163,224,0.2);
    border-radius: 14px;
    align-items: flex-start;
    transition: all 0.2s;
    cursor: default;
  }

  .solution-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, rgba(0,163,224,0.2), rgba(0,212,255,0.1));
    border: 1px solid rgba(0,163,224,0.3);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .solution-name {
    font-size: 14px;
    font-weight: 600;
    color: white;
    margin-bottom: 4px;
  }

  .solution-desc {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
    line-height: 1.6;
  }

  .solution-tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .tag-critical { background: rgba(255,59,92,0.15); color: var(--red); }
  .tag-recommended { background: rgba(255,214,0,0.15); color: var(--yellow); }
  .tag-enhance { background: rgba(0,229,160,0.15); color: var(--green); }

  /* CTA footer */
  .cta-footer {
    background: linear-gradient(135deg, rgba(0,163,224,0.15), rgba(0,212,255,0.08));
    border: 1px solid rgba(0,163,224,0.25);
    border-radius: 20px;
    padding: 36px;
    text-align: center;
    margin-top: 24px;
    box-shadow: 0 4px 30px rgba(0,163,224,0.1);
  }

  .cta-footer h3 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: white;
    margin-bottom: 10px;
    letter-spacing: -0.5px;
  }

  .cta-footer p {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 24px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.7;
    font-weight: 300;
  }

  .cta-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-outline {
    background: transparent;
    color: var(--rubrik-blue);
    border: 1.5px solid rgba(0,163,224,0.4);
  }

  /* Print button */
  .print-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-muted);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .result-header-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Welcome screen */
  .welcome {
    text-align: center;
    padding: 20px 0 40px;
    animation: fadeUp 0.7s ease both;
  }

  .welcome-features {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin: 36px 0;
  }

  .feature-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 20px;
    text-align: center;
    backdrop-filter: blur(12px);
  }

  .feature-icon {
    font-size: 28px;
    margin-bottom: 12px;
    display: block;
  }

  .feature-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: white;
    margin-bottom: 6px;
  }

  .feature-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    font-weight: 300;
  }

  @media (max-width: 600px) {
    .breakdown-grid { grid-template-columns: 1fr; }
    .welcome-features { grid-template-columns: 1fr; }
    .input-row { grid-template-columns: 1fr; }
    .question-card { padding: 24px; }
  }

  .hidden { display: none !important; }

  /* Loading spinner */
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===================== PRINT / PDF STYLES ===================== */
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body { background: #0A0F1E !important; color: #E8F0FF !important; }
    body::before, body::after { display: none !important; }
    .container { max-width: 100% !important; padding: 0 20px 20px !important; }
    #screen-welcome, #screen-questions, #screen-loading,
    .print-btn, .result-header-actions .print-btn,
    .cta-footer .btn-primary, .cta-footer .btn-outline,
    #screen-results > div:last-child { display: none !important; }
    #screen-results { display: block !important; }
    .score-hero { background: #0D1B3E !important; border: 1px solid rgba(0,163,224,0.4) !important; border-radius: 16px !important; padding: 28px !important; }
    .breakdown-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 12px !important; }
    .breakdown-card { background: #0D1B3E !important; border: 1px solid rgba(0,163,224,0.3) !important; border-radius: 12px !important; padding: 16px !important; }
    .breakdown-bar-bg { background: rgba(255,255,255,0.1) !important; }
    .findings-section { background: #0D1B3E !important; border: 1px solid rgba(0,163,224,0.3) !important; border-radius: 12px !important; }
    .solution-card { background: rgba(0,163,224,0.08) !important; border: 1px solid rgba(0,163,224,0.25) !important; border-radius: 10px !important; }
    .cta-footer { background: rgba(0,163,224,0.1) !important; border: 1px solid rgba(0,163,224,0.3) !important; }
    .tag-critical { background: rgba(255,59,92,0.2) !important; color: #FF3B5C !important; }
    .tag-recommended { background: rgba(255,214,0,0.2) !important; color: #FFD600 !important; }
    .tag-enhance { background: rgba(0,229,160,0.2) !important; color: #00E5A0 !important; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
